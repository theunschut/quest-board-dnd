name: Binary Release

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy (e.g. v1.2.3)'
        required: true

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish QuestBoard.Service/QuestBoard.Service.csproj -c Release -o ./publish -p:Version=${{ steps.version.outputs.version }}

      - name: Zip artifact
        run: cd publish && zip -r ../questboard-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: questboard-${{ github.ref_name }}.zip

  deploy:
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success') }}
    needs: [release]
    runs-on: self-hosted
    permissions: {}

    steps:
      - name: Deploy
        run: /home/questboard/deploy.sh ${{ github.event.inputs.tag || github.ref_name }}
